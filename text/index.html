<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Конспекты · AIpresentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Unbounded:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0908;
      --line: #3b3129;
      --text: #f8f0e4;
      --muted: #bea58b;
      --teal: #38d7c5;
      --amber: #f6a54b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--text);
      font-family: "Manrope", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(56, 215, 197, 0.16), transparent 34%),
        radial-gradient(circle at 85% 90%, rgba(246, 165, 75, 0.16), transparent 35%),
        linear-gradient(145deg, #090807 0%, #11100e 55%, #090807 100%);
    }

    .shell {
      width: min(860px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(32, 24, 20, 0.9), rgba(20, 16, 13, 0.96));
      box-shadow: 0 22px 40px rgba(0, 0, 0, 0.34);
      padding: clamp(18px, 3vw, 28px);
    }

    h1 {
      margin: 0 0 8px;
      font-family: "Unbounded", "Manrope", sans-serif;
      font-size: clamp(24px, 4vw, 42px);
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-top: 3px solid var(--teal);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
    }

    .card:nth-child(2) { border-top-color: var(--amber); }

    .card h2 {
      margin: 0 0 4px;
      font-size: 19px;
      font-family: "Unbounded", "Manrope", sans-serif;
    }

    .card p {
      margin: 0 0 10px;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      color: #f9f2e8;
      border-radius: 999px;
      border: 1px solid rgba(56, 215, 197, 0.55);
      background: rgba(56, 215, 197, 0.1);
      font-weight: 700;
      font-size: 13px;
      padding: 7px 11px;
    }

    .btn.secondary {
      border-color: rgba(246, 165, 75, 0.55);
      background: rgba(246, 165, 75, 0.1);
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Текстовые конспекты</h1>
    <p>Отдельные страницы для чтения markdown в удобном формате.</p>
    <section class="grid">
      <article class="card">
        <h2>Часть 0</h2>
        <p>Введение в вайбкодинг.</p>
        <div class="row">
          <a class="btn" href="../reading/part0/">Открыть</a>
          <a class="btn secondary" href="../content/part0_vibecoding.md">Исходный .md</a>
        </div>
      </article>
      <article class="card">
        <h2>Часть 1</h2>
        <p>AI-Assisted Development: от чата до агента.</p>
        <div class="row">
          <a class="btn" href="../reading/part1/">Открыть</a>
          <a class="btn secondary" href="../content/part1_foundations.md">Исходный .md</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
